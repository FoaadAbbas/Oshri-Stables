name: Keep Backend Alive

on:
  schedule:
    # Runs every 5 minutes, 24/7 (GitHub Actions minimum interval)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend every 45 seconds for 5 minutes
        run: |
          for i in 1 2 3 4 5 6 7; do
            echo "🏓 Ping #$i at $(date -u)..."
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://oshri-stables-api.onrender.com/api/health)
            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "✅ Backend is alive! (status: $HTTP_STATUS)"
            else
              echo "⚠️ Backend returned status $HTTP_STATUS"
            fi
            if [ $i -lt 7 ]; then
              sleep 45
            fi
          done
          echo "🏁 Done — 7 pings over ~5 minutes."
