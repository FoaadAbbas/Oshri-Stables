name: Keep Backend Alive

on:
  schedule:
    # Runs every 5 minutes, 24/7 (GitHub Actions minimum interval)
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          echo "🏓 Pinging backend at $(date -u)..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://oshri-stables-api.onrender.com/api/health)
          echo "Response status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ Backend is alive!"
          else
            echo "⚠️ Backend returned status $HTTP_STATUS — it may be waking up."
          fi
